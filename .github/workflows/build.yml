name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Download yt-dlp sidecar for both architectures
      - name: Download yt-dlp (x86_64)
        run: |
          mkdir -p src-tauri/binaries
          curl -fL -o src-tauri/binaries/yt-dlp-x86_64-apple-darwin \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src-tauri/binaries/yt-dlp-x86_64-apple-darwin

      - name: Download yt-dlp (aarch64)
        run: |
          curl -fL -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin

      # Bundle Deno so yt-dlp can solve YouTube JS challenges (required since yt-dlp 2025.11.12)
      - name: Download Deno (x86_64)
        run: |
          curl -fL -o /tmp/deno-x86.zip \
            "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-apple-darwin.zip"
          unzip -o /tmp/deno-x86.zip -d /tmp/deno-x86
          mv /tmp/deno-x86/deno src-tauri/binaries/deno-x86_64-apple-darwin
          chmod +x src-tauri/binaries/deno-x86_64-apple-darwin

      - name: Download Deno (aarch64)
        run: |
          curl -fL -o /tmp/deno-arm.zip \
            "https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip"
          unzip -o /tmp/deno-arm.zip -d /tmp/deno-arm
          mv /tmp/deno-arm/deno src-tauri/binaries/deno-aarch64-apple-darwin
          chmod +x src-tauri/binaries/deno-aarch64-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Ad-hoc sign so macOS doesn't show "damaged" error on downloaded apps
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Prism ${{ github.ref_name }}'
          releaseBody: |
            ## What's New

            - Fixed video parsing on installed app (YouTube links now work correctly)
            - Better error messages when link parsing fails
            - Audio-only download mode — extract MP3 from any video
            - Subtitle & playlist support
            - Download speed limiting from Settings

            ## Install

            **macOS**: Download the `.dmg` file, open it, and drag Prism to Applications. If macOS warns about an unidentified developer, right-click the app and choose "Open".
            **Windows**: Download the `.exe` installer and run it. Windows may show a SmartScreen warning — click "More info" then "Run anyway".
          releaseDraft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Download yt-dlp sidecar for Windows
      - name: Download yt-dlp (Windows x86_64)
        run: |
          mkdir -p src-tauri/binaries
          curl -fL -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"

      # Bundle Deno so yt-dlp can solve YouTube JS challenges
      - name: Download Deno (Windows x86_64)
        run: |
          curl -fL -o deno.zip "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"
          unzip -o deno.zip -d src-tauri/binaries/
          mv src-tauri/binaries/deno.exe src-tauri/binaries/deno-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Prism ${{ github.ref_name }}'
          releaseBody: |
            ## What's New

            - Fixed video parsing on installed app (YouTube links now work correctly)
            - Better error messages when link parsing fails
            - Audio-only download mode — extract MP3 from any video
            - Subtitle & playlist support
            - Download speed limiting from Settings

            ## Install

            **macOS**: Download the `.dmg` file, open it, and drag Prism to Applications. If macOS warns about an unidentified developer, right-click the app and choose "Open".
            **Windows**: Download the `.exe` installer and run it. Windows may show a SmartScreen warning — click "More info" then "Run anyway".
          releaseDraft: true
          prerelease: false
